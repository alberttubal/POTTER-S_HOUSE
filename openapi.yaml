openapi: 3.1.0
info:
  title: Potter's House API
  version: 1.0.0
  description: Canonical API contract for Potter's House backend.

servers:
  - url: https://pottershouse.example.com/api/v1
  - url: https://staging.pottershouse.example.com/api/v1

security:
  - bearerAuth: []

tags:
  - name: Auth
  - name: Packages
  - name: Bookings
  - name: Uploads
  - name: Testimonials
  - name: FAQs
  - name: Admin
  - name: Health

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100

  schemas:

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                    nullable: true
                  message:
                    type: string
            conflictingBookings:
              type: array
              items:
                $ref: '#/components/schemas/Booking'
            suggested_alternatives:
              type: array
              items:
                type: string
                description: ISO8601 datetime suggestions

    Admin:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        name:
          type: string
        role:
          type: string

    Package:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        short_description:
          type: string
        price:
          type: number
          nullable: true
        active:
          type: boolean
        created_at:
          type: string
          format: date-time

    Booking:
      type: object
      properties:
        id:
          type: string
          format: uuid
        customer_name:
          type: string
        phone:
          type: string
        email:
          type: string
        event_type:
          type: string
        event_date_start:
          type: string
          format: date-time
        event_date_end:
          type: string
          format: date-time
        guests:
          type: integer
        package_id:
          type: string
          format: uuid
          nullable: true
        workflow_status:
          type: string
          enum: [new, contacted, confirmed, paid, completed, cancelled]
        deposit_paid:
          type: boolean
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

paths:

  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  timestamp:
                    type: string
                    format: date-time

  /packages:
    get:
      tags: [Packages]
      summary: List packages
      parameters:
        - name: active
          in: query
          schema:
            type: boolean
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Package list
          content:
            application/json:
              schema:
                type: object
                properties:
                  packages:
                    type: array
                    items:
                      $ref: '#/components/schemas/Package'

  /packages/{id}:
    get:
      tags: [Packages]
      summary: Get package
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Package found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Package'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /bookings:
    post:
      tags: [Bookings]
      summary: Create booking
      description: Supports Idempotency-Key header for retries.
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - customer_name
                - phone
                - email
                - event_date_start
                - event_date_end
                - guests
              properties:
                customer_name:
                  type: string
                phone:
                  type: string
                email:
                  type: string
                event_type:
                  type: string
                event_date_start:
                  type: string
                  format: date-time
                event_date_end:
                  type: string
                  format: date-time
                guests:
                  type: integer
                package_id:
                  type: string
                  format: uuid
                  nullable: true
                notes:
                  type: string
      responses:
        '201':
          description: Booking created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Booking conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limited
          headers:
            Retry-After:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/login:
    post:
      tags: [Auth]
      summary: Admin login
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  expires_in:
                    type: integer
                  admin:
                    $ref: '#/components/schemas/Admin'
        '401':
          description: Unauthorized

  /admin/refresh:
    post:
      tags: [Auth]
      summary: Refresh admin token
      responses:
        '200':
          description: New token issued
        '401':
          description: Unauthorized

  /admin/bookings:
    get:
      tags: [Admin]
      summary: List bookings (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Booking list
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
        '401':
          description: Unauthorized

  /admin/bookings/{id}:
    get:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Get booking
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Booking found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '404':
          description: Not found

  /admin/bookings/{id}:
    put:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Update booking
      responses:
        '200':
          description: Booking updated
        '409':
          description: Conflict if confirming overlaps
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/bookings.csv:
    get:
      tags: [Admin]
      security:
        - bearerAuth: []
      summary: Export bookings CSV
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
      responses:
        '200':
          description: CSV export
          content:
            text/csv:
              schema:
                type: string
        '401':
          description: Unauthorized

  /admin/uploads:
    post:
      tags: [Uploads]
      security:
        - bearerAuth: []
      summary: Upload media
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Uploaded
        '400':
          description: Invalid upload
        '413':
          description: File too large