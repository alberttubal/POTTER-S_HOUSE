groups:
  - name: pottershouse-backend
    rules:
      - alert: PottershouseHighHttp5xxRate
        expr: |
          sum(rate(django_http_responses_total_by_status_total{status=~"5.."}[5m]))
          /
          sum(rate(django_http_responses_total_by_status_total[5m]))
          > 0.01
        for: 5m
        labels:
          severity: warning
          service: pottershouse-backend
        annotations:
          summary: "5xx rate above 1%"
          description: "More than 1% of responses are 5xx over the last 5 minutes."

      - alert: PottershouseOutboxBacklogHigh
        expr: pottershouse_outbox_backlog_total > 25
        for: 10m
        labels:
          severity: warning
          service: pottershouse-backend
        annotations:
          summary: "Email outbox backlog is growing"
          description: "Outbox backlog has been above 25 for 10 minutes."

      - alert: PottershouseOutboxLatencyHigh
        expr: pottershouse_outbox_queue_latency_seconds > 900
        for: 10m
        labels:
          severity: warning
          service: pottershouse-backend
        annotations:
          summary: "Email outbox latency high"
          description: "Oldest outbox message has been waiting more than 15 minutes."
