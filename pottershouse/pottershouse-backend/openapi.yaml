openapi: 3.0.3
info:
  title: Potters House API
  version: 1.0.0
servers:
  - url: /api/v1
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorWrapper:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                    nullable: true
                  message:
                    type: string
            conflictingBookings:
              type: array
              items: {}
            suggested_alternatives:
              type: array
              items: {}
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        timestamp:
          type: string
          format: date-time
    Booking:
      type: object
      properties:
        id:
          type: string
          format: uuid
        customer_name:
          type: string
        phone:
          type: string
        email:
          type: string
        event_type:
          type: string
        event_date_start:
          type: string
          format: date-time
        event_date_end:
          type: string
          format: date-time
        event_all_day:
          type: boolean
        guests:
          type: integer
        package_id:
          type: string
          format: uuid
          nullable: true
        dietary_needs:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        status:
          type: string
        workflow_status:
          type: string
        deposit_paid:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Package:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        price:
          type: number
        active:
          type: boolean
    Upload:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
        key:
          type: string
        size:
          type: integer
        alt_text:
          type: string
          nullable: true
        published:
          type: boolean
    Testimonial:
      type: object
      properties:
        id:
          type: string
          format: uuid
        customer_name:
          type: string
        content:
          type: string
        published:
          type: boolean
    FAQ:
      type: object
      properties:
        id:
          type: string
          format: uuid
        question:
          type: string
        answer:
          type: string
        published:
          type: boolean
    UploadUrlsResponse:
      type: object
      properties:
        urls:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
              key:
                type: string
              size:
                type: integer
              alt_text:
                type: string
                nullable: true
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /admin/login:
    post:
      summary: Admin login
      responses:
        '200':
          description: OK
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorWrapper'
  /admin/refresh:
    post:
