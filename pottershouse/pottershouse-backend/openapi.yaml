  /packages:
    get:
      summary: List packages
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Package'
  /packages/{id}:
    get:
      summary: Get package
      responses:
        '200':
