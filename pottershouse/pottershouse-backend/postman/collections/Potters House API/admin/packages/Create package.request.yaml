$kind: http-request
url: http://{{baseUrl}}/admin/packages
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "name": "string",
      "price": 6437.443108288657,
      "description": "string",
      "active": false
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Create package.resources/examples
order: 2000
