$kind: http-example
request:
  url: http://{{baseUrl}}/admin/testimonials
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: json
    content: |-
      {
        "customer_name": "string",
        "content": "string",
        "published": false
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": {
          "code": "string",
          "message": "string",
          "details": [
            {
              "field": "string",
              "message": "string"
            },
            {
              "field": "string",
              "message": "string"
            }
          ],
          "conflictingBookings": [
            "",
            ""
          ],
          "suggested_alternatives": [
            "",
            ""
          ]
        }
      }
order: 3000
