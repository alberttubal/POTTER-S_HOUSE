$kind: http-request
url: http://{{baseUrl}}/admin/testimonials
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "customer_name": "string",
      "content": "string",
      "published": false
    }
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/Create testimonial (admin).resources/examples
order: 2000
