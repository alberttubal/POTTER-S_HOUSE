$kind: http-example
request:
  url: http://{{baseUrl}}/admin/uploads
  method: POST
  headers:
    - key: Content-Type
      value: multipart/form-data
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  body:
    type: formdata
    content:
      - type: text
        key: files
        value: string,string
        description: ""
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": {
          "code": "string",
          "message": "string",
          "details": [
            {
              "field": "string",
              "message": "string"
            },
            {
              "field": "string",
              "message": "string"
            }
          ],
          "conflictingBookings": [
            "",
            ""
          ],
          "suggested_alternatives": [
            "",
            ""
          ]
        }
      }
order: 2000
